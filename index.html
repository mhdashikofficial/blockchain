<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link rel="icon" type="image/png" href="https://i.ibb.co/gLCdZmVh/84d1bd30b0cb06352ef0cf6fbae3285c-icon.png" />
  <title>Blockchain Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'btc-orange': '#f7931a',
            'bg-dark': '#0f1117',
            'card-dark': '#1a1f2e',
            'accent-green': '#00c087',
          },
          borderRadius: { '3xl': '1.5rem' },
          fontSize: { 'xxs': '0.65rem' },
          animation: {
            'bounce-in': 'bounceIn 0.6s ease-out',
            'fade-out': 'fadeOut 0.8s ease-in 2.2s forwards',
          },
          keyframes: {
            bounceIn: {
              '0%': { transform: 'scale(0.3)', opacity: '0' },
              '50%': { transform: 'scale(1.15)' },
              '70%': { transform: 'scale(0.9)' },
              '100%': { transform: 'scale(1)', opacity: '1' }
            },
            fadeOut: {
              '0%': { opacity: '1' },
              '100%': { opacity: '0', transform: 'translateY(-10px)' }
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #4b5563;
      transition: all 0.2s;
    }
    .pin-dot.filled {
      background: #f7931a;
      transform: scale(1.25);
    }
    .screen { display: none; }
    #pin-screen { display: flex; }
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(26,31,46,0.94);
      backdrop-filter: blur(10px);
      border-top: 1px solid #2d3748;
      height: 68px;
    }
    @media (max-width: 380px) {
      h1 { font-size: 1.8rem; }
      .text-5xl { font-size: 2.8rem; }
      button.h-20 { height: 4.5rem; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-white text-base">

  <!-- ── PIN Screen ─────────────────────────────────────────────── -->
  <div id="pin-screen" class="flex-1 flex flex-col items-center justify-center px-5 py-8">
    <div class="w-20 h-20 mb-6 rounded-2xl bg-gradient-to-br from-btc-orange to-orange-700 flex items-center justify-center shadow-xl">
      <i class="fa-brands fa-bitcoin text-5xl text-white"></i>
    </div>
    <h1 class="text-3xl font-bold mb-2">Unlock Wallet</h1>
    <p class="text-gray-400 mb-8 text-center">Enter your passcode</p>

    <div id="pin-dots" class="flex gap-6 mb-10">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>

    <div class="grid grid-cols-3 gap-4 w-full max-w-xs">
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="1">1</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="2">2</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="3">3</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="4">4</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="5">5</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="6">6</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="7">7</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="8">8</button>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="9">9</button>
      <div></div>
      <button class="key text-4xl font-medium bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition touch-manipulation" data-value="0">0</button>
      <button id="delete" class="text-3xl text-gray-300 bg-card-dark rounded-2xl h-20 active:bg-gray-700 transition flex items-center justify-center touch-manipulation">
        <i class="fa-solid fa-delete-left"></i>
      </button>
    </div>
  </div>

  <!-- ── Home Screen ────────────────────────────────────────────── -->
  <div id="home-screen" class="screen flex-1 flex flex-col pb-20 overflow-y-auto">
    <div class="pt-12 pb-8 px-5 text-center">
      <p class="text-gray-400 mb-1">Total Balance</p>
      <div class="text-5xl font-extrabold tracking-tight sm:text-6xl">
        28.000000<span class="text-3xl sm:text-4xl font-bold text-btc-orange ml-3">BTC</span>
      </div>
      <div class="mt-3 text-2xl sm:text-3xl font-semibold text-accent-green">
        ≈ $2,000,000
        <span class="text-base ml-2 bg-accent-green/25 text-accent-green px-2.5 py-1 rounded-full">+5.2%</span>
      </div>
    </div>

    <div class="flex justify-around px-4 py-8">
      <button onclick="showScreen('receive-screen')" class="flex flex-col items-center active:opacity-75">
        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-accent-green/20 flex items-center justify-center mb-2">
          <i class="fa-solid fa-arrow-down text-accent-green text-3xl sm:text-4xl"></i>
        </div>
        <span class="text-base sm:text-lg">Receive</span>
      </button>
      <button onclick="showScreen('send-screen')" class="flex flex-col items-center active:opacity-75">
        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-btc-orange/20 flex items-center justify-center mb-2">
          <i class="fa-solid fa-arrow-up text-btc-orange text-3xl sm:text-4xl"></i>
        </div>
        <span class="text-base sm:text-lg">Send</span>
      </button>
      <button onclick="alert('Swap feature coming soon')" class="flex flex-col items-center active:opacity-75">
        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-blue-500/20 flex items-center justify-center mb-2">
          <i class="fa-solid fa-arrow-right-arrow-left text-blue-400 text-3xl sm:text-4xl"></i>
        </div>
        <span class="text-base sm:text-lg">Swap</span>
      </button>
    </div>

    <div class="bottom-nav flex items-center justify-around text-gray-400 text-xxs sm:text-xs">
      <button onclick="showScreen('home-screen')" class="flex flex-col items-center text-btc-orange py-2 flex-1">
        <i class="fa-solid fa-house text-2xl sm:text-3xl"></i>
        <span class="mt-1">Home</span>
      </button>
      <button onclick="showScreen('receive-screen')" class="flex flex-col items-center py-2 flex-1">
        <i class="fa-solid fa-qrcode text-2xl sm:text-3xl"></i>
        <span class="mt-1">Receive</span>
      </button>
      <button onclick="showScreen('send-screen')" class="flex flex-col items-center py-2 flex-1">
        <i class="fa-solid fa-paper-plane text-2xl sm:text-3xl"></i>
        <span class="mt-1">Send</span>
      </button>
    </div>
  </div>

  <!-- ── Receive Screen ─────────────────────────────────────────── -->
  <div id="receive-screen" class="screen flex-1 flex flex-col pb-20 overflow-y-auto">
    <div class="pt-12 px-5 pb-6 text-center">
      <h2 class="text-2xl sm:text-3xl font-bold mb-2">Receive Bitcoin</h2>
      <p class="text-gray-400 mb-6 text-sm sm:text-base">Share this address</p>

      <div class="bg-card-dark rounded-2xl p-5 mb-6 border border-gray-700 text-sm sm:text-base font-mono break-all select-all leading-relaxed">
        bc1p5d7rjq7g6r4jdyhzks9smlaqtedr4dekq08ge8ztwac72sfr9rusxg3297
      </div>

      <button onclick="alert('QR code simulation – demo only')" class="w-full bg-btc-orange text-black font-bold py-4 rounded-2xl active:opacity-80 text-lg">
        Show QR Code
      </button>
    </div>

    <div class="bottom-nav flex items-center justify-around text-gray-400 text-xxs sm:text-xs">
      <button onclick="showScreen('home-screen')" class="flex flex-col items-center py-2 flex-1">
        <i class="fa-solid fa-house text-2xl sm:text-3xl"></i>
        <span class="mt-1">Home</span>
      </button>
      <button class="flex flex-col items-center text-btc-orange py-2 flex-1">
        <i class="fa-solid fa-qrcode text-2xl sm:text-3xl"></i>
        <span class="mt-1">Receive</span>
      </button>
      <button onclick="showScreen('send-screen')" class="flex flex-col items-center py-2 flex-1">
        <i class="fa-solid fa-paper-plane text-2xl sm:text-3xl"></i>
        <span class="mt-1">Send</span>
      </button>
    </div>
  </div>

  <!-- ── Send Screen ────────────────────────────────────────────── -->
  <div id="send-screen" class="screen flex-1 flex flex-col pb-20 overflow-y-auto">
    <div class="pt-12 px-5 pb-6">
      <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-center">Send Bitcoin</h2>

      <div class="space-y-5">
        <div>
          <label class="block text-gray-300 mb-1.5 text-sm sm:text-base">To Address</label>
          <input id="to-address" type="text" placeholder="Paste BTC address" class="w-full bg-card-dark border border-gray-700 rounded-xl px-4 py-3.5 text-base focus:outline-none focus:border-btc-orange">
        </div>

        <div>
          <label class="block text-gray-300 mb-1.5 text-sm sm:text-base">Amount (BTC)</label>
          <input id="amount" type="number" step="any" min="0" placeholder="0.00000000" class="w-full bg-card-dark border border-gray-700 rounded-xl px-4 py-3.5 text-base focus:outline-none focus:border-btc-orange">
        </div>

        <button id="send-btn" class="w-full bg-btc-orange text-black font-bold py-4 rounded-2xl active:opacity-80 text-lg">
          Send
        </button>
      </div>

      <!-- Success animation container -->
      <div id="success-animation" class="hidden mt-10 flex flex-col items-center">
        <div class="w-24 h-24 rounded-full bg-accent-green/20 flex items-center justify-center animate-bounce-in">
          <i class="fa-solid fa-circle-check text-accent-green text-6xl"></i>
        </div>
        <p class="mt-4 text-xl sm:text-2xl font-bold text-accent-green animate-fade-out">
          Sent Successfully!
        </p>
      </div>
    </div>

    <div class="bottom-nav flex items-center justify-around text-gray-400 text-xxs sm:text-xs">
      <button onclick="showScreen('home-screen')" class="flex flex-col items-center py-2 flex-1">
        <i class="fa-solid fa-house text-2xl sm:text-3xl"></i>
        <span class="mt-1">Home</span>
      </button>
      <button onclick="showScreen('receive-screen')" class="flex flex-col items-center py-2 flex-1">
        <i class="fa-solid fa-qrcode text-2xl sm:text-3xl"></i>
        <span class="mt-1">Receive</span>
      </button>
      <button class="flex flex-col items-center text-btc-orange py-2 flex-1">
        <i class="fa-solid fa-paper-plane text-2xl sm:text-3xl"></i>
        <span class="mt-1">Send</span>
      </button>
    </div>
  </div>

  <script>
    let pin = '';
    const correctPin = '2586';
    const dots = document.querySelectorAll('.pin-dot');

    document.querySelectorAll('.key').forEach(btn => {
      btn.addEventListener('click', () => {
        if (pin.length < 4) {
          pin += btn.dataset.value;
          updateDots();
          checkPin();
        }
      });
    });

    document.getElementById('delete').addEventListener('click', () => {
      pin = pin.slice(0, -1);
      updateDots();
    });

    function updateDots() {
      dots.forEach((dot, i) => dot.classList.toggle('filled', i < pin.length));
    }

    function checkPin() {
      if (pin.length === 4) {
        if (pin === correctPin) {
          document.getElementById('pin-screen').style.display = 'none';
          showScreen('home-screen');
        } else {
          document.getElementById('pin-screen').classList.add('animate-shake');
          setTimeout(() => {
            document.getElementById('pin-screen').classList.remove('animate-shake');
            pin = '';
            updateDots();
          }, 500);
        }
      }
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'flex';
      // Hide success animation when changing screens
      document.getElementById('success-animation').classList.add('hidden');
    }

    document.getElementById('send-btn').addEventListener('click', () => {
      const addr = document.getElementById('to-address').value.trim();
      const amt = parseFloat(document.getElementById('amount').value) || 0;

      if (addr.length > 20 && amt > 0) {
        // Show animated success
        const successEl = document.getElementById('success-animation');
        successEl.classList.remove('hidden');

        // Auto hide + reset form after animation
        setTimeout(() => {
          successEl.classList.add('hidden');
          document.getElementById('to-address').value = '';
          document.getElementById('amount').value = '';
        }, 3200);
      } else {
        alert('Please enter a valid address and amount > 0');
      }
    });
  </script>

  <style>
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-6px)}
      40%,80%{transform:translateX(6px)}
    }
    .animate-shake { animation: shake 0.4s; }
  </style>

</body>
</html>
